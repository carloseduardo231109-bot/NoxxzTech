<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoxxzPay - Central de Recompensas</title>
    
    <script src="https://alwingulla.com/88/tag.min.js" data-zone="11209821" async data-cfasync="false"></script>
    
    <style>
        /* Estilização Premium Dark (Padrão de Aplicativos Financeiros) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
            background: #121824;
            border: 1px solid #1f293d;
            border-radius: 16px;
            padding: 35px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Área do Logotipo Sem Imagem - Apenas as Iniciais Premium */
        .brand-area {
            margin-bottom: 25px;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 180, 219, 0.3);
            border: 2px solid #1f293d;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Botão de Ação Estilo Fintech */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border: none;
            padding: 16px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.2);
        }

        .btn-action:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .footer-note {
            font-size: 11px;
            color: #475569;
            margin-top: 25px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-area">
            <div class="logo-placeholder">
                NP
            </div>
        </div>

        <h2>Central de Anúncios</h2>
        <p>Assista ao conteúdo patrocinado completo para validar sua atividade e computar seu bônus de conta.</p>

        <button class="btn-action" onclick="executarAnuncioPremiado()">📺 ASSISTIR AGORA</button>
        
        <span class="footer-note">Ambiente seguro verificado por NoxxzPay API</span>
    </div>

    <script>
        // Função que aciona o anúncio da Monetag
        function executarAnuncioPremiado() {
            if (typeof show_11209821 === 'function') {
                show_11209821().then(() => {
                    alert('Sucesso: Conteúdo assistido! Seus dados foram sincronizados.');
                }).catch(err => {
                    alert('Aviso: O anúncio não pôde ser carregado. Tente novamente em instantes.');
                });
            } else {
                alert('Aviso: Carregando provedor de anúncios. Aguarde um segundo e clique novamente.');
            }
        }
    </script>

</body>
</html>
